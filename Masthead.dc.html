<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  .mh-item{cursor:pointer;transition:color .16s}
  .mh-item:hover,.mh-item:hover .mh-cn{color:#7e56b4 !important}
  @media (max-width:760px){
    .mh-top{flex-wrap:wrap !important;gap:12px 18px !important}
  }
</style>
</helmet>

<div style="background:#efe9d8;font-family:'Noto Serif SC',serif;color:#2c2730">
  <div style="max-width:1180px;margin:0 auto;padding:clamp(16px,2.6vw,30px) clamp(16px,4vw,56px) 0">
    <div class="mh-top" style="display:flex;align-items:flex-start;justify-content:space-between;gap:24px;padding-bottom:12px;border-bottom:1px solid #2c2730">
      <div onClick="{{ onTop }}" class="mh-item" style="flex-shrink:0">
        <div style="font-family:'Special Elite',monospace;font-size:clamp(15px,2vw,20px);letter-spacing:.06em">ASONG</div>
        <div style="font-size:clamp(11px,1.4vw,13px);letter-spacing:.3em;color:#6f6678">宋昕雨</div>
      </div>
      <div style="display:flex;align-items:flex-start;gap:clamp(12px,2.2vw,30px);flex-wrap:wrap;justify-content:flex-end">
        <div onClick="{{ onTop }}" class="mh-item" style="text-align:center;color:{{ cTop }}">
          <div style="font-family:'Special Elite',monospace;font-size:clamp(10px,1.1vw,12px);letter-spacing:.12em">FRONT PAGE</div>
          <div class="mh-cn" style="font-size:clamp(11px,1.3vw,13px);letter-spacing:.18em;color:{{ cTop }}">基本信息</div>
        </div>
        <div onClick="{{ onWork }}" class="mh-item" style="text-align:center;color:{{ cWork }}">
          <div style="font-family:'Special Elite',monospace;font-size:clamp(10px,1.1vw,12px);letter-spacing:.12em">CAREER LEDGER</div>
          <div class="mh-cn" style="font-size:clamp(11px,1.3vw,13px);letter-spacing:.18em;color:{{ cWork }}">职场履历</div>
        </div>
        <div onClick="{{ onIntern }}" class="mh-item" style="text-align:center;color:{{ cIntern }}">
          <div style="font-family:'Special Elite',monospace;font-size:clamp(10px,1.1vw,12px);letter-spacing:.12em">INTERNSHIPS</div>
          <div class="mh-cn" style="font-size:clamp(11px,1.3vw,13px);letter-spacing:.18em;color:{{ cIntern }}">实习经历</div>
        </div>
        <div onClick="{{ onCampus }}" class="mh-item" style="text-align:center;color:{{ cCampus }}">
          <div style="font-family:'Special Elite',monospace;font-size:clamp(10px,1.1vw,12px);letter-spacing:.12em">CAMPUS</div>
          <div class="mh-cn" style="font-size:clamp(11px,1.3vw,13px);letter-spacing:.18em;color:{{ cCampus }}">校园经历</div>
        </div>
        <div onClick="{{ onProject }}" class="mh-item" style="text-align:center;color:{{ cProject }}">
          <div style="font-family:'Special Elite',monospace;font-size:clamp(10px,1.1vw,12px);letter-spacing:.12em">PROJECT ARCHIVE</div>
          <div class="mh-cn" style="font-size:clamp(11px,1.3vw,13px);letter-spacing:.18em;color:{{ cProject }}">项目展示</div>
        </div>
        <div onClick="{{ onExplore }}" class="mh-item" style="text-align:center;color:{{ cExplore }}">
          <div style="font-family:'Special Elite',monospace;font-size:clamp(10px,1.1vw,12px);letter-spacing:.12em">EXPLORATION</div>
          <div class="mh-cn" style="font-size:clamp(11px,1.3vw,13px);letter-spacing:.18em;color:{{ cExplore }}">支线探索</div>
        </div>
      </div>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;auto&quot;},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;top&quot;,&quot;work&quot;,&quot;intern&quot;,&quot;campus&quot;,&quot;project&quot;,&quot;explore&quot;],&quot;default&quot;:&quot;work&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;onTop&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;() =&gt; void&quot;},&quot;onWork&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;() =&gt; void&quot;},&quot;onIntern&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;() =&gt; void&quot;},&quot;onCampus&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;() =&gt; void&quot;},&quot;onProject&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;() =&gt; void&quot;},&quot;onExplore&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;() =&gt; void&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const active = this.props.active || '';
    const on = '#7e56b4', off = '#2c2730';
    const onfn = (name) => this.props['on' + name] || (() => {});
    return {
      onTop: onfn('Top'), onWork: onfn('Work'), onIntern: onfn('Intern'),
      onCampus: onfn('Campus'), onProject: onfn('Project'), onExplore: onfn('Explore'),
      cTop: active === 'top' ? on : off,
      cWork: active === 'work' ? on : off,
      cIntern: active === 'intern' ? on : off,
      cCampus: active === 'campus' ? on : off,
      cProject: active === 'project' ? on : off,
      cExplore: active === 'explore' ? on : off,
    };
  }
}
</script>
</body>
</html>
