<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Noto+Serif+SC:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<script src="assets/image-slot.js"></script>
<style>
  .wk-row{display:grid;grid-template-columns:128px 1fr 218px;gap:clamp(14px,2vw,30px)}
  .wk-btitle{font-weight:600;color:#2c2730;text-decoration:underline;text-underline-offset:3px;text-decoration-color:#b9accb}
  @media (max-width:820px){
    .wk-row{grid-template-columns:92px 1fr !important}
    .wk-img{grid-column:1 / -1 !important;justify-self:start !important;max-width:300px;margin-top:6px}
  }
  @media (max-width:520px){
    .wk-row{grid-template-columns:1fr !important}
    .wk-date{text-align:left !important}
    .wk-spine{display:none !important}
    .wk-content{border-left:none !important;padding-left:0 !important}
  }
</style>
</helmet>

<div style="background:#efe9d8;font-family:'Noto Serif SC',serif;color:#2c2730">

  <div style="background:linear-gradient(180deg,#b3a3c4 0%,#a294b8 100%);padding:clamp(22px,4vw,46px) 0 clamp(20px,3vw,34px);position:relative;overflow:hidden">
    <div style="position:absolute;top:0;right:0;width:38%;height:60%;background:#e9e0cf;border-radius:0 0 0 60px;opacity:.55"></div>
    <div style="max-width:1180px;margin:0 auto;padding:0 clamp(18px,4vw,56px);position:relative">
      <div style="font-size:clamp(20px,2.6vw,30px);font-weight:700;letter-spacing:.05em;color:#fff">Vol.&#8544;：职场履历</div>
      <div style="margin-top:clamp(12px,2vw,22px);font-style:italic;font-size:clamp(14px,1.8vw,21px);color:#efe9d8;letter-spacing:.02em">以品牌内容、社媒运营、媒介投放与营销赋能，构建可持续的市场传播体系。</div>
    </div>
  </div>

  <div style="max-width:1180px;margin:0 auto;padding:clamp(24px,4vw,52px) clamp(18px,4vw,56px) clamp(60px,8vw,110px)">

    <div style="display:flex;justify-content:flex-end;margin-bottom:clamp(6px,1.5vw,14px)">
      <div style="display:flex;align-items:flex-start;gap:8px;color:#7e56b4;font-size:clamp(12px,1.4vw,15px);line-height:1.5;text-align:left">
        <span style="font-size:16px;transform:translateY(-1px)">&#8593;</span>
        <span>更多作品详情<br>请查看&lt;项目展示&gt;</span>
      </div>
    </div>

    <div style="display:flex;flex-direction:column;gap:clamp(30px,5vw,58px)">
      <sc-for list="{{ jobs }}" as="job" hint-placeholder-count="5">
        <div class="wk-row">

          <div class="wk-date" style="text-align:right;padding-top:2px">
            <div style="font-family:'Special Elite',monospace;font-size:clamp(13px,1.5vw,16px);letter-spacing:.01em;color:#2c2730">{{ job.date }}</div>
            <sc-if value="{{ job.note }}" hint-placeholder-val="">
              <div style="margin-top:10px;font-size:clamp(11px,1.2vw,12.5px);line-height:1.7;color:#6f6678;text-align:left">{{ job.note }}</div>
            </sc-if>
          </div>

          <div class="wk-spine wk-content" style="border-left:1.5px solid #c7bdd4;padding-left:clamp(16px,2vw,28px);position:relative">
            <span style="position:absolute;left:-7px;top:4px;width:12px;height:12px;border-radius:50%;background:#8d72b8;box-shadow:0 0 0 3px #efe9d8"></span>
            <div style="font-size:clamp(15px,1.7vw,18px);font-weight:500">{{ job.company }}</div>
            <div style="font-size:clamp(19px,2.4vw,27px);font-weight:700;letter-spacing:.16em;margin:4px 0 clamp(14px,2vw,20px)">{{ job.role }}</div>
            <div style="display:flex;flex-direction:column;gap:clamp(11px,1.6vw,16px)">
              <sc-for list="{{ job.items }}" as="it" hint-placeholder-count="4">
                <div style="font-size:clamp(13px,1.45vw,15.5px);line-height:1.95;color:#3b3640;text-align:justify">
                  <span class="wk-btitle">{{ it.t }}</span>：{{ it.b }}
                </div>
              </sc-for>
            </div>
          </div>

          <div class="wk-img" style="align-self:start;display:flex;flex-direction:column;gap:3px">
            <image-slot id="{{ job.imgId }}" src="{{ job.img }}" fit="{{ job.fit }}" style="width:100%;height:auto;aspect-ratio:{{ job.imgAr }};display:block;background:#efe9d8" shape="rounded" radius="3" placeholder="{{ job.imgHint }}"></image-slot>
            <sc-if value="{{ job.imgId2 }}" hint-placeholder-val="">
              <image-slot id="{{ job.imgId2 }}" src="{{ job.img2 }}" fit="contain" style="width:100%;height:auto;aspect-ratio:{{ job.imgAr2 }};display:block;background:#efe9d8" shape="rounded" radius="3" placeholder="{{ job.imgHint2 }}"></image-slot>
            </sc-if>
          </div>

        </div>
      </sc-for>
    </div>

  </div>
</div>
</x-dc>

</body>
</html>
